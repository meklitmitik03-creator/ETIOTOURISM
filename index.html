<!DOCTYPE html>
<html>

<head>
<title>Ethioturism</title>
<link rel="stylesheet" href="style.css">

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body>

<!-- MENU BUTTON -->
<div class="menu-btn" onclick="toggleSidebar()">☰</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Ethioturism</h2>

  <a href="#"><i class="fas fa-home"></i> Home</a>
  <a href="#"><i class="fas fa-globe"></i> Culture</a>
  <a href="#"><i class="fas fa-landmark"></i> History</a>
  <a href="#"><i class="fas fa-paw"></i> Land & Animals</a>
  <a href="#"><i class="fas fa-hotel"></i> Resorts</a>
</div>

<!-- MAIN -->
<div class="main">

<!-- HERO -->
<div class="home-hero">
  <div class="hero-box">
    <h1>Welcome to Ethiopia</h1>
    <p>Discover beauty, culture, and history</p>
  </div>
</div>

<!-- SECTION -->
<div class="section">

<h2>Explore Ethiopia</h2>

<div class="cards">

<a href="#" class="card">
<img src="https://images.unsplash.com/photo-1634029878815-1bb307302471?w=500">
<h3>Transportation</h3>
<button>Explore</button>
</a>

<a href="#" class="card">
<img src="https://images.unsplash.com/photo-1608634193723-1865aa4416ce?w=500">
<h3>Location</h3>
<button>Explore</button>
</a>

<a href="#" class="card">
<img src="https://images.unsplash.com/photo-1573403092240-26095e118918?w=500">
<h3>Booking</h3>
<button>Explore</button>
</a>

<a href="#" class="card">
<img src="https://images.unsplash.com/flagged/photo-1572644973628-e9be84915d59?w=500">
<h3>Contact</h3>
<button>Explore</button>
</a>

</div>

</div>

</div>

<!-- CHAT BUTTON -->
<div class="chat-toggle" onclick="toggleChat()">💬</div>

<!-- CHAT BOX -->
<div class="chat-box" id="chatBox">
  <div class="chat-header" onclick="toggleChat()">AI Assistant ✖</div>
  <div class="chat-body" id="chatBody"></div>
  <input type="text" id="chatInput" placeholder="Ask something...">
  <button onclick="sendMessage()">Send</button>
</div>

<script src="script.js"></script>

</body>
</html>
